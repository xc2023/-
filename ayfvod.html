<script>(function(){

        siteUrl: "https://www.yfvod.com",

        searchKeyword: "",

        playData: null,

        currentEpisode: 0
    };
    const $ = (s) => document.querySelector(s);
    async function request(url, referer) {
        if (window.fm && typeof window.fm.req === "function") {
            const resp = await window.fm.req(url, {
                method: "GET",
                responseType: "text",
                timeout: 30,
                credentials: "include",
                headers: { "User-Agent": "Mozilla/5.0", "Referer": referer || CONFIG.siteUrl + "/" }
            });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return resp.body;
        }
        const resp = await fetch(url, {
            headers: { "User-Agent": "Mozilla/5.0", "Referer": referer || CONFIG.siteUrl + "/" }
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return await resp.text();
    }
    function resolveUrl(u) {
        if (!u) return "";
        if (window.fm && window.fm.res) return window.fm.res(u, { credentials: "include" });
        if (u.startsWith("//")) return "https:" + u;
        if (u.startsWith("/")) return CONFIG.siteUrl + u;
        return u;
    }
    async function tmdbSearch(keyword) {
        try {
            const url = `${CONFIG.tmdb.base}/search/multi?api_key=${CONFIG.tmdb.apiKey}&language=zh-CN&query=${encodeURIComponent(keyword)}&include_adult=false&page=1`;
            const resp = await fetch(url);
            if (!resp.ok) return [];
            const data = await resp.json();
            return (data.results || []).filter(r => r.media_type === "movie" || r.media_type === "tv").slice(0,10).map(r => ({
                tmdbId: String(r.id),
                mediaType: r.media_type,

    function buildCarousel(items) {
        if (!items || items.length === 0) {
            document.getElementById('carouselWrapper').style.display = 'none';
            return;
        }
        carouselItems = items;
        carouselDisplayItems = [...items, ...items];
        track = document.getElementById('carouselTrack');
        dotsContainer = document.getElementById('carouselDots');
        if (!track) return;
        track.innerHTML = '';
        carouselDisplayItems.forEach((item, idx) => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.innerHTML = `
                <img src="${item.img}" alt="${item.title}" loading="lazy">
                <div class="slide-text">
                    <div class="slide-type">${escapeHtml(item.type)}</div>
                    <div class="slide-title">${escapeHtml(item.title)}</div>

            slide.addEventListener('click', () => {
                openDetail({ vod_id: item.link, vod_name: item.title, vod_pic: item.img, vod_tag: item.type, vod_remarks: item.desc });
            });
            track.appendChild(slide);
        });
        dotsContainer.innerHTML = '';
        for (let i = 0; i < items.length; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.addEventListener('click', () => goToSlide(i));
            dotsContainer.appendChild(dot);
        }
        carouselIndex = 0;
        updateCarousel(false);
        startAutoPlay();
        document.getElementById('carouselWrapper').style.display = 'block';
    }
    function updateCarousel(animate = true) {
        if (!track) return;
        const slideWidth = track.parentElement.clientWidth;
        const displayIndex = carouselIndex % carouselDisplayItems.length;
        track.style.transition = animate ? 'transform 0.3s ease-out' : 'none';
        track.style.transform = `translateX(-${displayIndex * slideWidth}px)`;
        const activeDotIndex = carouselIndex % carouselItems.length;
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, idx) => {
            if (idx === activeDotIndex) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }
    function goToSlide(index) {
        if (index < 0) index = 0;
        if (index >= carouselItems.length) index = carouselItems.length - 1;
        carouselIndex = index;
        updateCarousel(true);
        resetAutoPlay();
    }
    function nextSlide() {
        carouselIndex++;
        updateCarousel(true);
        if (carouselIndex >= carouselItems.length * 2) {
            setTimeout(() => {
                carouselIndex = carouselIndex % carouselItems.length;
                updateCarousel(false);
            }, 300);
        }
        resetAutoPlay();
    }
    function prevSlide() {
        carouselIndex--;
        updateCarousel(true);
        if (carouselIndex < 0) {
            setTimeout(() => {
                carouselIndex = carouselIndex + carouselItems.length;
                updateCarousel(false);
            }, 300);
        }
        resetAutoPlay();
    }
    function startAutoPlay() {
        if (carouselInterval) clearInterval(carouselInterval);
        carouselInterval = setInterval(() => nextSlide(), 5000);
    }
    function resetAutoPlay() {
        if (carouselInterval) {
            clearInterval(carouselInterval);

    function initCarouselTouch() {
        const container = document.querySelector('.carousel-container');
        if (!container) return;
        let touchStartX = 0;
        container.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            resetAutoPlay();
        });
        container.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) prevSlide();
                else nextSlide();
                resetAutoPlay();
            }
        });
    }

    async function parsePlayPage(playUrl) {
        let fullUrl = CONFIG.siteUrl + playUrl;
        let html = await request(fullUrl, CONFIG.siteUrl);
        let iframeMatch = html.match(/src=["'](\/vod\/player\/[^"']+)["']/i);
        if (!iframeMatch) throw new Error("未找到播放器");
        let playerHtml = await request(CONFIG.siteUrl + iframeMatch[1], CONFIG.siteUrl);
        let dataMatch = playerHtml.match(/var\s+player_aaaa\s*=\s*(\{[\s\S]*?\})\s*<\/script>/);
        if (!dataMatch) throw new Error("无播放数据");
        let playerData = JSON.parse(dataMatch[1]);
        let videoUrl = playerData.url || "";
        let from = playerData.from || "";
        let encrypt = playerData.encrypt || 0;
        if (encrypt === 1) videoUrl = unescape(videoUrl);
        else if (encrypt === 2) videoUrl = unescape(atob(videoUrl));
        if (!videoUrl) throw new Error("地址为空");
        if (/youku|iqiyi|qq|mgtv|bilibili/i.test(videoUrl)) return { type: "sniff", url: fullUrl };
        let prefix = PARSE_MAP[from] || "";
        if (prefix) return { type: "parse", url: prefix + encodeURIComponent(videoUrl) };
        return { type: "direct", url: videoUrl };
    }

                request(`${CONFIG.siteUrl}/index.php/ajax/suggest?mid=1&wd=${encodeURIComponent(keyword)}&limit=20`, CONFIG.siteUrl).catch(() => null),
                tmdbSearch(keyword)
            ]);
            let items = [];
            if (ajaxResp) {
                try {
                    let data = JSON.parse(ajaxResp);
                    if (data.code === 1 && data.list) {
                        items = data.list.map(d => ({
                            vod_id: `/vodhtml/${d.id}/`,
                            vod_name: d.name,
                            vod_pic: d.pic || "",
                            vod_tag: "",
                            vod_remarks: ""
                        }));
                    }
                } catch(e) {}
            }
            if (items.length === 0) {
                let html = await request(`${CONFIG.siteUrl}/vod-search/-------------.html?wd=${encodeURIComponent(keyword)}`, CONFIG.siteUrl);
                items = parseVodList(html);
            }
            items = items.map(it => {
                let match = tmdbRes.find(t => t.title.includes(it.vod_name) || it.vod_name.includes(t.title));
                if (match) {
                    return {
                        ...it,
                        tmdbPoster: match.poster,
                        tmdbRating: match.rating,
                        tmdbOverview: match.overview,
                        tmdbYear: match.year,
                        tmdbType: match.mediaType
                    };
                }
                return it;
            });
            state.searchVodList = items;
            state.searchHasMore = items.length > 20;
            renderSearchList(false);
        } catch(e) {
            tip.innerHTML = '<div class="error-tip">搜索失败</div>';
        }

    }
    function closeSearch() {
        $("#searchOverlay").classList.remove("active");
        state.searchMode = false;
    }
    function initScroll() {
        let timer = null;
        const onScroll = () => {
            if (timer) return;
            timer = setTimeout(() => {
                timer = null;
                const isSearch = state.searchMode && $("#searchOverlay").classList.contains("active");
                const scrollElement = isSearch ? $("#searchOverlay") : window;
                const scrollTop = isSearch ? scrollElement.scrollTop : (window.scrollY || document.documentElement.scrollTop);
                const clientHeight = isSearch ? scrollElement.clientHeight : window.innerHeight;
                const scrollHeight = isSearch ? scrollElement.scrollHeight : document.documentElement.scrollHeight;
                if (scrollHeight - scrollTop - clientHeight < 400) {
                    if (state.loading) return;
                    if (isSearch) {
                        if (!state.searchHasMore) return;
                        state.loading = true;
                        $("#searchListTip").innerHTML = '<div class="loading">加载更多...</div>';
                        state.searchPage++;
                        request(`${CONFIG.siteUrl}/index.php/ajax/suggest?mid=1&wd=${encodeURIComponent(state.searchKeyword)}&page=${state.searchPage}&limit=20`, CONFIG.siteUrl)
                            .then(resp => {
                                let addItems = [];
                                try {
                                    let data = JSON.parse(resp);
                                    if (data.code === 1 && data.list) {
                                        addItems = data.list.map(d => ({ vod_id: `/vodhtml/${d.id}/`, vod_name: d.name, vod_pic: d.pic || "", vod_tag: "", vod_remarks: "" }));
                                    }
                                } catch(e) {}
                                if (addItems.length) {
                                    state.searchVodList.push(...addItems);
                                    state.searchHasMore = addItems.length >= 20;
                                    renderSearchList(true, addItems);
                                } else {
                                    state.searchHasMore = false;
                                    $("#searchListTip").innerHTML = '<div class="no-more">没有更多了</div>';
                                }
                            })
                            .finally(() => { state.loading = false; });
                    } else {
                        if (!state.hasMore || !state.cat) return;
                        state.loading = true;
                        $("#listTip").innerHTML = '<div class="loading">加载更多...</div>';
                        state.page++;
                        let url = buildCategoryUrl(state.cat, state.page);
                        request(url, CONFIG.siteUrl)
                            .then(html => {
                                let items = parseVodList(html);
                                if (items.length) {
                                    state.vodList.push(...items);
                                    state.hasMore = items.length >= 18;
                                    renderGridList(true, items);
                                } else {
                                    state.hasMore = false;
                                    $("#listTip").innerHTML = '<div class="no-more">没有更多了</div>';
                                }
                            })
                            .finally(() => { state.loading = false; });
                    }
                }
            }, 100);
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        $("#searchOverlay")?.addEventListener("scroll", onScroll, { passive: true });
    }
    async function init() {
        if (window.fongmiBridge || window.fm || window.fongmi) document.documentElement.classList.add("fm-native");
        if (!window.fm) {
            await new Promise(resolve => {
                const handler = () => { if (window.fm) resolve(); else setTimeout(handler, 100); };
                window.addEventListener("fmsdk", handler, { once: true });
                setTimeout(resolve, 2000);
            });
        }
        const carouselData = await fetchCarouselData();
        if (carouselData.length > 0) {
            buildCarousel(carouselData);
            initCarouselTouch();
            const prevBtn = document.getElementById('carouselPrev');
            const nextBtn = document.getElementById('carouselNext');
            if (prevBtn) prevBtn.addEventListener('click', () => prevSlide());
            if (nextBtn) nextBtn.addEventListener('click', () => nextSlide());
        } else {
            document.getElementById('carouselWrapper').style.display = 'none';
        }
        const bar = $("#categoryBar");
        if (bar) {
            let html = "";
            for (let c of CONFIG.categories) {
                html += `<div class="category-item${c.id === state.cat ? " active" : ""}" data-id="${c.id}">${c.name}</div>`;
            }
            bar.innerHTML = html;
            bar.querySelectorAll(".category-item").forEach(el => {
                el.addEventListener("click", () => {
                    let id = el.dataset.id;
                    if (id === state.cat && state.vodList.length) return;
                    bar.querySelectorAll(".category-item").forEach(e => e.classList.remove("active"));
                    el.classList.add("active");
                    state.searchMode = false;
                    closeSearch();
                    state.cat = id;
                    state.page = 1;
                    state.vodList = [];
                    state.hasMore = !!id;
                    loadPage();
                });
            });
        }
        $("#wormhole-icon")?.addEventListener("click", () => doSearch($("#searchInput")?.value));
        $("#searchInput")?.addEventListener("keypress", e => { if (e.key === "Enter") doSearch(e.target.value); });
        $("#detailClose")?.addEventListener("click", closeDetail);
        $("#detailOverlay")?.addEventListener("click", e => { if (e.target === e.currentTarget) closeDetail(); });
        $("#searchCloseBtn")?.addEventListener("click", closeSearch);
        initScroll();
        await loadPage();
    }
    init().catch(console.error);
})();</script>
<button class="back-to-top" id="backToTop" title="回到顶部">↑</button>
<script>(function(){
    const btn = document.getElementById('backToTop');
    let ticking = false;
    window.addEventListener('scroll', function() {
        if (!ticking) {
            requestAnimationFrame(function() {
                btn.classList.toggle('show', window.scrollY > 600);
                ticking = false;
            });
            ticking = true;
        }
    }, { passive: true });
    btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
})();</script>
